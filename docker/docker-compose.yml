# =============================================================================
# docker/docker-compose.yml
# Production environment for Simple Matrix + Element Home Server
#
# Services:
#   postgres     – PostgreSQL database for Synapse
#   synapse      – Matrix Synapse homeserver
#   element      – Element Web client (served by nginx)
#   nginx        – Reverse proxy (HTTP or HTTPS depending on SSL_ENABLED)
#   certbot      – Let's Encrypt certificate management
#   coturn        – STUN/TURN server for WebRTC NAT traversal
#   livekit      – LiveKit SFU for scalable group video/screen sharing
#   lk-jwt       – JWT bridge: Matrix auth → LiveKit tokens
# =============================================================================

# ── Secrets from environment variables ────────────────────────────────────────
x-common-env: &common-env
  ROOT_DOMAIN: ${ROOT_DOMAIN}
  MATRIX_DOMAIN: ${MATRIX_DOMAIN}
  ELEMENT_DOMAIN: ${ELEMENT_DOMAIN}
  LIVEKIT_DOMAIN: ${LIVEKIT_DOMAIN}
  TURN_DOMAIN: ${TURN_DOMAIN}

networks:
  matrix:
    driver: bridge

volumes:
  postgres_data:
  synapse_data:
  letsencrypt_data:
  coturn_data:
  livekit_data:

services:

  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16.6-alpine
    restart: unless-stopped
    networks: [matrix]
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-synapse}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-synapse}
      # Synapse requires UTF-8 locale
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --lc-collate=C --lc-ctype=C"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-synapse}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Matrix Synapse ───────────────────────────────────────────────────────────
  synapse:
    image: matrixdotorg/synapse:latest
    restart: unless-stopped
    networks: [matrix]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SYNAPSE_CONFIG_PATH: /data/homeserver.yaml
    volumes:
      # Persistent data: media store and other runtime data
      - synapse_data:/data
      # Read-only config (generated by deploy.sh from template)
      - ./data/synapse/homeserver.yaml:/data/homeserver.yaml:ro
      - ./data/synapse/log.config:/data/log.config:ro
      # Signing key (generated into ./data/synapse/ by deploy.sh; must be
      # explicitly bind-mounted because synapse_data is a separate named volume)
      - ./data/synapse/${MATRIX_DOMAIN}.signing.key:/data/${MATRIX_DOMAIN}.signing.key:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8008/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ── Element Web ──────────────────────────────────────────────────────────────
  element:
    image: ghcr.io/element-hq/element-web:latest
    restart: unless-stopped
    networks: [matrix]
    volumes:
      - ./data/element/config.json:/app/config.json:ro

  # ── nginx Reverse Proxy ──────────────────────────────────────────────────────
  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    restart: unless-stopped
    networks:
      matrix:
        aliases:
          # These aliases let other containers resolve public domain names to nginx
          # internally, bypassing NAT loopback (required for lk-jwt token validation).
          - ${MATRIX_DOMAIN}
          - ${ELEMENT_DOMAIN}
          - ${LIVEKIT_DOMAIN}
    depends_on:
      - synapse
      - element
      - lk-jwt
    ports:
      - "80:80"
      - "443:443"
      # Matrix federation port
      - "8448:8448"
    environment:
      <<: *common-env
      SSL_ENABLED: ${SSL_ENABLED:-false}
    volumes:
      - letsencrypt_data:/etc/letsencrypt:ro
      # certbot webroot challenge path (write access needed for HTTP challenge)
      - ./data/certbot/www:/var/www/certbot:ro

  # ── Certbot (Let's Encrypt) ──────────────────────────────────────────────────
  # This service is run on-demand via init-letsencrypt.sh; it does NOT restart.
  certbot:
    image: certbot/certbot:latest
    volumes:
      - letsencrypt_data:/etc/letsencrypt
      - ./data/certbot/www:/var/www/certbot
    profiles:
      # Only started when explicitly requested (docker-compose --profile certbot ...)
      - certbot

  # ── coturn STUN / TURN Server ─────────────────────────────────────────────────
  coturn:
    image: coturn/coturn:latest
    restart: unless-stopped
    # coturn needs host networking for UDP relay to work correctly.
    # network_mode: host is incompatible with the custom 'matrix' network,
    # so Synapse reaches coturn via the host loopback (127.0.0.1) instead.
    network_mode: host
    volumes:
      - ./data/coturn/turnserver.conf:/etc/coturn/turnserver.conf:ro
      - letsencrypt_data:/etc/letsencrypt:ro
      - coturn_data:/var/lib/coturn
    # Expose STUN/TURN ports
    # (host networking handles this automatically, but documented for clarity)
    # ports:
    #   - "3478:3478/udp"  # STUN + TURN over UDP
    #   - "3478:3478/tcp"  # TURN over TCP
    #   - "5349:5349/tcp"  # TURNS over TLS
    #   - "49152-65535:49152-65535/udp"  # TURN relay range

  # ── LiveKit SFU ──────────────────────────────────────────────────────────────
  livekit:
    image: livekit/livekit-server:latest
    restart: unless-stopped
    networks: [matrix]
    command: ["--config", "/etc/livekit/livekit.yaml"]
    volumes:
      - ./data/livekit/livekit.yaml:/etc/livekit/livekit.yaml:ro
      - livekit_data:/data
    ports:
      # WebRTC / ICE via UDP
      - "7882:7882/udp"
      # WebSocket signalling – bound to localhost for debugging only;
      # production traffic reaches LiveKit via the nginx reverse proxy
      # on the internal Docker network (no host port exposure needed).
      - "127.0.0.1:7880:7880"

  # ── lk-jwt-service (Matrix → LiveKit JWT bridge) ─────────────────────────────
  lk-jwt:
    image: ghcr.io/element-hq/lk-jwt-service:latest
    restart: unless-stopped
    networks: [matrix]
    volumes:
      - ./data/lk-jwt/config.yaml:/config.yaml:ro
    environment:
      # Must be the public WSS URL so that browsers can connect directly.
      # nginx aliases ${LIVEKIT_DOMAIN} on the internal Docker network so
      # lk-jwt's own API calls to LiveKit also route correctly internally.
      LIVEKIT_URL: wss://${LIVEKIT_DOMAIN}
      LIVEKIT_KEY: ${LIVEKIT_API_KEY}
      LIVEKIT_SECRET: ${LIVEKIT_API_SECRET}
      LIVEKIT_FULL_ACCESS_HOMESERVERS: ${MATRIX_DOMAIN}
